<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'><rect width='28' height='28' rx='6' fill='%23a855f7'/><path d='M14 7v14M7 14h14' stroke='white' stroke-width='3' stroke-linecap='round'/></svg>">
</head>
<body class="view-page">

  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Loading -->
  <div class="view-loading" id="viewLoading">
    <div class="spinner"></div>
    <p style="color:var(--text-secondary)">Loading profile...</p>
  </div>

  <!-- Error -->
  <div class="view-error hidden" id="viewError">
    <h2>Profile Not Found</h2>
    <p>This profile doesn't exist or was removed.</p>
    <a href="index.html" class="btn btn-primary mt-4">Create Your Own</a>
  </div>

  <!-- Profile Content -->
  <div class="hidden" id="viewContent">
    <div class="profile-container">

      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profileAvatar"></div>
          <div class="profile-status"></div>
        </div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-bio" id="profileBio"><span class="typing-cursor"></span></div>
        <div class="profile-badges" id="profileBadges"></div>
      </div>

      <!-- Device Alert Banner (shown when active SOS) -->
      <div class="emergency-alert-active hidden" id="deviceAlertBanner">
        <div class="alert-title">EMERGENCY ALERT ACTIVE</div>
        <div class="alert-meta" id="alertBannerMeta">SOS triggered</div>
        <div class="map-container mini hidden" id="alertMiniMap" style="margin-top:12px"></div>
        <button class="alert-resolve-btn hidden" id="alertResolveBtn" onclick="resolveAlertFromView()">Mark as Resolved</button>
      </div>

      <!-- Device Dashboard Link -->
      <a href="#" class="btn btn-secondary hidden" id="deviceDashboardLink" style="width:100%;margin-bottom:16px;font-size:0.8125rem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Device Dashboard
      </a>

      <!-- Custom Buttons -->
      <div class="profile-links" id="profileLinks"></div>

      <!-- Social Icons -->
      <div class="profile-socials" id="profileSocials"></div>

      <!-- Emergency Section -->
      <div class="emergency-section" id="emergencySection" style="display:none">
        <a href="tel:911" class="emergency-banner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 014.12 4.18 2 2 0 016.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          Call 911
        </a>

        <div class="info-card hidden" id="bloodTypeCard">
          <div class="info-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>
            <span class="info-card-label">Blood Type</span>
          </div>
          <div class="blood-type-display">
            <div class="blood-type-badge" id="viewBloodType"></div>
          </div>
        </div>

        <div class="info-card hidden" id="allergiesCard">
          <div class="info-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span class="info-card-label">Allergies</span>
          </div>
          <div class="tag-list" id="viewAllergies"></div>
        </div>

        <div class="info-card hidden" id="medicationsCard">
          <div class="info-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
            <span class="info-card-label">Medications</span>
          </div>
          <div class="tag-list" id="viewMedications"></div>
        </div>

        <div class="info-card hidden" id="conditionsCard">
          <div class="info-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span class="info-card-label">Conditions</span>
          </div>
          <div class="tag-list" id="viewConditions"></div>
        </div>

        <div class="info-card hidden" id="contactsCard">
          <div class="info-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 014.12 4.18 2 2 0 016.11 2h3"/></svg>
            <span class="info-card-label">Emergency Contacts</span>
          </div>
          <div id="viewContacts"></div>
        </div>

        <div class="info-card hidden" id="notesCard">
          <div class="info-card-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span class="info-card-label">Notes</span>
          </div>
          <div class="notes-text" id="viewNotes"></div>
        </div>
      </div>

      <!-- View Counter -->
      <div class="view-counter" id="viewCounter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="viewCount">0</span> views
      </div>

      <!-- Footer -->
      <div class="view-footer">
        <p>Made with <a href="index.html">Kairo's Help</a></p>
      </div>
    </div>
  </div>

  <!-- Leaflet + Supabase -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/view.js"></script>
</body>
</html>
